name: Mail Cron Job (alle 30 Minuten)

on:
  schedule:
    - cron: "*/30 * * * *"
  workflow_dispatch:

jobs:
  send_mails:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v4
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Send subscription emails
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          SMTP_USER: ${{ secrets.SMTP_USER }}
          SMTP_PASSWORD: ${{ secrets.SMTP_PASSWORD }}
          SMTP_HOST: ${{ secrets.SMTP_HOST }}
          SMTP_PORT: ${{ secrets.SMTP_PORT }}
          FROM_EMAIL: ${{ secrets.FROM_EMAIL }}
          API_KEY: ${{ secrets.API_KEY }}
          OPENROUTER_API_URL: ${{ secrets.OPENROUTER_API_URL }}
          MODEL_NAME: ${{ secrets.MODEL_NAME }}
          MAIL_SUBJECT: ${{ secrets.MAIL_SUBJECT }}
          MAIL_BODY: ${{ secrets.MAIL_BODY }}
        run: python send_subscription_emails.py
