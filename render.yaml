services:
  - type: web
    name: immo-web
    runtime: python
    plan: starter
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app:app --bind 0.0.0.0:$PORT
    envVars:
      - key: PYTHON_VERSION
        value: 3.12.4

  - type: cron
    name: immo-scraper
    runtime: python
    schedule: "0 */4 * * *"
    buildCommand: pip install -r requirements.txt
    startCommand: python kleinanzeigen_scraper.py
    envVars:
      - key: PYTHON_VERSION
        value: 3.12.4

  - type: cron
    name: immo-mails
    runtime: python
    schedule: "*/30 * * * *"
    buildCommand: pip install -r requirements.txt
    startCommand: python send_subscription_emails.py
    envVars:
      - key: PYTHON_VERSION
        value: 3.12.4
