<!doctype html>
<html lang="de">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Manage Subscriptions</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <style>
      :root {
        --bg: #f8f9f6;
        --surface: #ffffff;
        --surface-soft: #f2f4f1;
        --line: #d8ddd9;
        --line-strong: #c9cfcb;
        --text: #111514;
        --muted: #69746f;
        --green: #17352f;
        --green-soft: #d9ece6;
        --green-tint: #eef5f1;
        --danger: #c13a32;
        --shadow: 0 10px 30px rgba(20, 32, 28, 0.08);
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        font-family: Inter, sans-serif;
        color: var(--text);
        background: var(--bg);
        -webkit-font-smoothing: antialiased;
      }

      a {
        color: inherit;
        text-decoration: none;
      }

      button,
      select,
      input {
        font: inherit;
      }

      .page {
        min-height: 100vh;
      }

      .topbar {
        min-height: 72px;
        border-bottom: 1px solid rgba(17, 21, 20, 0.06);
        background: rgba(248, 249, 246, 0.96);
        padding: 0;
      }

      .topbar-inner,
      .content {
        width: min(1240px, calc(100vw - 40px));
        margin: 0 auto;
      }

      .topbar-inner {
        min-height: 72px;
        display: grid;
        grid-template-columns: 1fr auto 1fr;
        align-items: center;
        gap: 16px;
        font-size: 14px;
        color: var(--muted);
      }

      .brand {
        color: var(--text);
        font-weight: 600;
        font-size: 16px;
        letter-spacing: -0.01em;
      }

      .nav {
        display: inline-flex;
        gap: 28px;
        font-size: 14px;
        align-items: center;
        flex-wrap: nowrap;
        white-space: nowrap;
      }

      .nav a {
        position: relative;
        padding: 4px 0;
      }

      .nav a.active {
        color: var(--text);
        font-weight: 500;
      }

      .nav a.active::after {
        content: "";
        position: absolute;
        left: 0;
        right: 0;
        bottom: -1px;
        height: 1px;
        background: var(--text);
      }

      .topbar-actions {
        justify-self: end;
        display: inline-flex;
        gap: 18px;
        color: var(--text);
      }

      .icon {
        width: 20px;
        height: 20px;
        stroke: currentColor;
        fill: none;
        stroke-width: 1.7;
        stroke-linecap: round;
        stroke-linejoin: round;
      }

      .content {
        padding-top: 46px;
        padding-bottom: 34px;
      }

      .heading h1 {
        margin: 0;
        font-size: 52px;
        line-height: 1;
        letter-spacing: -0.05em;
        font-weight: 500;
      }

      .heading p {
        margin: 16px 0 0;
        color: var(--muted);
        font-size: 15px;
        max-width: 660px;
        line-height: 1.65;
      }

      .layout {
        margin-top: 30px;
        display: grid;
        grid-template-columns: 360px 1fr;
        gap: 24px;
      }

      .status-card {
        background: linear-gradient(160deg, #102823 0%, #15352e 100%);
        color: #f1faf6;
        border-radius: 4px;
        padding: 24px;
        box-shadow: var(--shadow);
        min-height: 420px;
        display: flex;
        flex-direction: column;
      }

      .status-eyebrow {
        color: #a7c1b8;
        font-size: 12px;
        letter-spacing: 0.08em;
        text-transform: uppercase;
      }

      .status-card h2 {
        margin: 10px 0 16px;
        font-size: 52px;
        line-height: 0.95;
        letter-spacing: -0.06em;
        font-weight: 600;
      }

      .status-list {
        margin: 0;
        padding: 0;
        list-style: none;
        display: grid;
        gap: 12px;
        font-size: 13px;
      }

      .status-list li {
        display: flex;
        gap: 8px;
        align-items: center;
        color: #e1efe9;
      }

      .upgrade {
        margin-top: auto;
        height: 42px;
        border: 1px solid rgba(255, 255, 255, 0.45);
        border-radius: 3px;
        background: rgba(255, 255, 255, 0.92);
        color: #16352f;
        font-size: 13px;
        cursor: pointer;
      }

      .subscriptions {
        display: grid;
        gap: 14px;
      }

      .subscription-item {
        border: 1px solid var(--line);
        border-radius: 4px;
        background: var(--surface);
        padding: 16px 18px;
      }

      .sub-header {
        display: flex;
        align-items: center;
        justify-content: space-between;
      }

      .sub-badge {
        padding: 4px 9px;
        border-radius: 99px;
        background: var(--green-tint);
        color: #547b6e;
        font-size: 10px;
        letter-spacing: 0.06em;
        text-transform: uppercase;
      }

      .sub-location {
        margin-left: 8px;
        color: #8e9793;
        font-size: 11px;
      }

      .sub-email {
        margin-top: 12px;
        font-size: 40px;
        letter-spacing: -0.05em;
        line-height: 1;
        font-weight: 500;
        overflow-wrap: anywhere;
      }

      .sub-meta {
        margin-top: 14px;
        display: flex;
        gap: 18px;
        flex-wrap: wrap;
        color: var(--muted);
        font-size: 13px;
      }

      .sub-meta-item {
        display: inline-flex;
        align-items: center;
        gap: 4px;
      }

      .sub-actions {
        display: inline-flex;
        align-items: center;
        gap: 14px;
      }

      .sub-actions button {
        border: none;
        background: transparent;
        color: #193931;
        cursor: pointer;
        font-size: 13px;
        display: inline-flex;
        align-items: center;
        gap: 6px;
        padding: 2px 0;
      }

      .sub-actions button.delete {
        color: var(--danger);
      }

      .add-card {
        border: 1px dashed var(--line-strong);
        border-radius: 4px;
        min-height: 116px;
        display: grid;
        place-items: center;
        text-align: center;
        color: #65726d;
        background: rgba(255, 255, 255, 0.35);
      }

      .add-link {
        display: inline-grid;
        gap: 8px;
        font-size: 14px;
      }

      .plus-badge {
        width: 28px;
        height: 28px;
        border-radius: 999px;
        display: inline-grid;
        place-items: center;
        background: #30584f;
        color: white;
        margin: 0 auto;
        font-size: 20px;
        line-height: 1;
      }

      .feedback {
        min-height: 22px;
        font-size: 13px;
        margin-top: 12px;
        color: #58716a;
      }

      .feedback.error {
        color: #a33f36;
      }

      .empty {
        border: 1px solid var(--line);
        border-radius: 4px;
        background: var(--surface);
        padding: 20px;
        font-size: 14px;
        color: var(--muted);
      }

      @media (max-width: 1200px) {
        .topbar-inner,
        .content {
          width: min(1240px, calc(100vw - 32px));
        }

        .layout {
          grid-template-columns: 320px 1fr;
          gap: 18px;
        }

        .heading h1 {
          font-size: 46px;
        }
      }

      @media (max-width: 1040px) {
        .layout {
          grid-template-columns: 1fr;
        }

        .status-card {
          min-height: 260px;
        }

        .sub-email {
          font-size: 34px;
        }
      }

      @media (max-width: 700px) {
        .topbar {
          min-height: 0;
          padding: 10px 0;
        }

        .topbar-inner {
          min-height: 0;
          grid-template-columns: 1fr;
          justify-items: center;
          gap: 10px;
          font-size: 13px;
        }

        .topbar-actions {
          justify-self: center;
        }

        .nav {
          justify-self: center;
          gap: 18px;
          font-size: 13px;
          flex-wrap: nowrap;
        }

        .brand {
          font-size: 15px;
        }

        .icon {
          width: 18px;
          height: 18px;
        }

        .content {
          padding-top: 22px;
        }

        .heading h1 {
          font-size: 40px;
        }

        .heading p {
          font-size: 14px;
          max-width: 100%;
        }

        .subscription-item {
          padding: 14px;
        }

        .sub-email {
          font-size: 30px;
        }
      }

      @media (max-width: 560px) {
        .topbar-inner,
        .content {
          width: calc(100vw - 24px);
        }

        .layout {
          gap: 16px;
          margin-top: 24px;
        }

        .status-card {
          padding: 18px;
          min-height: 220px;
        }

        .status-card h2 {
          font-size: 44px;
        }
      }
    </style>
  </head>
  <body>
    <div id="root"></div>

    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    {% raw %}
    <script type="text/babel">
      const NAME_POOL = [
        "Metropolitan Luxury",
        "Yield Hunter",
        "Multi-Unit Residential",
        "Growth Radar",
        "Core Asset Monitor",
      ];

      const CITY_POOL = ["Stuttgart, DE"];

      const FREQUENCY_LABELS = {
        daily: "Daily Digest",
        weekly: "Weekly Summary",
        biweekly: "2-Week Summary",
        monthly: "Monthly Report",
      };

      function euro(value) {
        return `€${new Intl.NumberFormat("de-DE").format(value)}`;
      }

      function scannerLabel(index) {
        return NAME_POOL[index % NAME_POOL.length];
      }

      function cityLabel(index) {
        return CITY_POOL[index % CITY_POOL.length];
      }

      function frequencySummary(frequency) {
        return FREQUENCY_LABELS[frequency] || frequency;
      }

      function icon(path) {
        return (
          <svg className="icon" viewBox="0 0 24 24" aria-hidden="true">
            {path}
          </svg>
        );
      }

      function App() {
        const [subscriptions, setSubscriptions] = React.useState([]);
        const [busyKey, setBusyKey] = React.useState("");
        const [feedback, setFeedback] = React.useState({type: "", text: ""});
        const [loading, setLoading] = React.useState(true);

        const loadSubscriptions = async () => {
          setLoading(true);
          try {
            const response = await fetch("/api/subscriptions");
            const data = await response.json();
            if (!response.ok) {
              throw new Error(
                data.error || "Abos konnten nicht geladen werden.",
              );
            }
            setSubscriptions(data.subscriptions || []);
            setFeedback({type: "", text: ""});
          } catch (error) {
            setFeedback({
              type: "error",
              text: error.message || "Unbekannter Fehler.",
            });
          } finally {
            setLoading(false);
          }
        };

        React.useEffect(() => {
          loadSubscriptions();
        }, []);

        const removeSubscription = async (email) => {
          setBusyKey(`delete-${email}`);
          setFeedback({type: "", text: ""});
          try {
            const response = await fetch(
              `/api/subscription?email=${encodeURIComponent(email)}`,
              {
                method: "DELETE",
              },
            );
            const data = await response.json();
            if (!response.ok) {
              throw new Error(
                data.error || "Abo konnte nicht geloescht werden.",
              );
            }
            setFeedback({type: "success", text: "Subscription removed."});
            await loadSubscriptions();
          } catch (error) {
            setFeedback({
              type: "error",
              text: error.message || "Unbekannter Fehler.",
            });
          } finally {
            setBusyKey("");
          }
        };

        const editSubscription = async (row) => {
          const currentMax = String(row.maxPriceEur || "");
          const nextMaxRaw = window.prompt("Maximalpreis in EUR", currentMax);
          if (nextMaxRaw === null) {
            return;
          }

          const nextFrequency = window.prompt(
            "Frequenz (daily, weekly, biweekly, monthly)",
            row.frequency,
          );
          if (nextFrequency === null) {
            return;
          }

          const parsedMax = Number(nextMaxRaw.replace(/\./g, ""));
          if (!Number.isInteger(parsedMax) || parsedMax < 50000) {
            setFeedback({
              type: "error",
              text: "Maximalpreis muss eine ganze Zahl >= 50.000 sein.",
            });
            return;
          }

          setBusyKey(`edit-${row.email}`);
          setFeedback({type: "", text: ""});
          try {
            const response = await fetch("/api/subscription", {
              method: "POST",
              headers: {"Content-Type": "application/json"},
              body: JSON.stringify({
                email: row.email,
                frequency: nextFrequency.trim().toLowerCase(),
                maxPriceEur: parsedMax,
              }),
            });
            const data = await response.json();
            if (!response.ok) {
              throw new Error(
                data.error || "Abo konnte nicht aktualisiert werden.",
              );
            }

            setFeedback({type: "success", text: "Subscription updated."});
            await loadSubscriptions();
          } catch (error) {
            setFeedback({
              type: "error",
              text: error.message || "Unbekannter Fehler.",
            });
          } finally {
            setBusyKey("");
          }
        };

        const scannerCount = subscriptions.length;

        return (
          <div className="page">
            <header className="topbar">
              <div className="topbar-inner">
                <div className="brand">Immo Scanner</div>
                <nav className="nav" aria-label="Hauptnavigation">
                  <a href="/">Setup</a>
                  <a className="active" href="/subscriptions/manage">
                    Subscriptions
                  </a>
                </nav>
                <div className="topbar-actions">
                  {icon(
                    <>
                      <path d="M12 6a4 4 0 0 0-4 4v3l-1.5 2h11L16 13v-3a4 4 0 0 0-4-4Z" />
                      <path d="M10.5 18a1.5 1.5 0 0 0 3 0" />
                    </>,
                  )}
                  {icon(
                    <>
                      <circle cx="12" cy="8" r="3.2" />
                      <path d="M6 19c1.5-3.2 4-4.8 6-4.8s4.5 1.6 6 4.8" />
                    </>,
                  )}
                </div>
              </div>
            </header>

            <main className="content">
              <section className="heading">
                <h1>Manage Subscriptions</h1>
                <p>
                  Monitor and adjust your active real estate newsletter filters.
                  High-precision alerts are delivered based on your custom
                  criteria.
                </p>
              </section>

              <section className="layout">
                <aside className="status-card">
                  <span className="status-eyebrow">Account Status</span>
                  <h2>
                    {scannerCount}
                    <br />
                    Active Scanners
                  </h2>
                  <ul className="status-list">
                    <li>
                      {icon(<circle cx="12" cy="12" r="8" />)}
                      <span>Premium Data Feed Active</span>
                    </li>
                    <li>
                      {icon(<circle cx="12" cy="12" r="8" />)}
                      <span>Last update 14m ago</span>
                    </li>
                  </ul>
                  <button type="button" className="upgrade">
                    Upgrade Plan
                  </button>
                </aside>

                <div>
                  <div className="subscriptions">
                    {loading && (
                      <div className="empty">Loading subscriptions ...</div>
                    )}

                    {!loading && subscriptions.length === 0 && (
                      <div className="empty">
                        Noch keine aktiven Abos vorhanden.
                      </div>
                    )}

                    {subscriptions.map((row, index) => (
                      <article
                        className="subscription-item"
                        key={row.subscriptionId || row.email}
                      >
                        <div className="sub-header">
                          <div>
                            <span className="sub-badge">
                              {scannerLabel(index)}
                            </span>
                            <span className="sub-location">
                              {cityLabel(index)}
                            </span>
                          </div>
                          <div className="sub-actions">
                            <button
                              type="button"
                              onClick={() => editSubscription(row)}
                              disabled={Boolean(busyKey)}
                            >
                              {icon(<path d="M4 20h4l10-10-4-4L4 16v4Z" />)}{" "}
                              Edit
                            </button>
                            <button
                              className="delete"
                              type="button"
                              onClick={() => removeSubscription(row.email)}
                              disabled={Boolean(busyKey)}
                            >
                              {icon(
                                <>
                                  <path d="M6 7h12" />
                                  <path d="M9 7V5h6v2" />
                                  <path d="M9 10v7" />
                                  <path d="M15 10v7" />
                                </>,
                              )}
                            </button>
                          </div>
                        </div>

                        <div className="sub-email">{row.email}</div>

                        <div className="sub-meta">
                          <span className="sub-meta-item">
                            {icon(<path d="M4 12h16" />)}{" "}
                            {frequencySummary(row.frequency)}
                          </span>
                          <span className="sub-meta-item">
                            {icon(<path d="M6 8h12v8H6z" />)} {euro(50000)} -{" "}
                            {euro(row.maxPriceEur)}
                          </span>
                        </div>
                      </article>
                    ))}

                    <div className="add-card">
                      <a className="add-link" href="/">
                        <span className="plus-badge">+</span>
                        <span>Create New Newsletter Scan</span>
                      </a>
                    </div>
                  </div>

                  <div className={`feedback ${feedback.type}`}>
                    {feedback.text}
                  </div>
                </div>
              </section>
            </main>
          </div>
        );
      }

      ReactDOM.createRoot(document.getElementById("root")).render(<App />);
    </script>
    {% endraw %}
  </body>
</html>
