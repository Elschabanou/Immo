<!doctype html>
<html lang="de">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Immo Scanner Newsletter</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <style>
      :root {
        --bg: #f8f9f6;
        --surface: #ffffff;
        --surface-soft: #f2f4f1;
        --surface-line: #d8ddd9;
        --surface-line-strong: #c9cfcb;
        --text: #111514;
        --muted: #69746f;
        --muted-2: #8f9894;
        --green: #17352f;
        --green-strong: #0f2823;
        --green-soft: #d9ece6;
        --shadow: 0 10px 30px rgba(20, 32, 28, 0.08);
        --shadow-soft: 0 4px 16px rgba(20, 32, 28, 0.06);
        --radius: 4px;
      }

      * {
        box-sizing: border-box;
      }

      html,
      body {
        min-height: 100%;
      }

      body {
        margin: 0;
        font-family: Inter, sans-serif;
        color: var(--text);
        background: var(--bg);
        -webkit-font-smoothing: antialiased;
        text-rendering: optimizeLegibility;
      }

      a {
        color: inherit;
        text-decoration: none;
      }
      button,
      input {
        font: inherit;
      }

      #root {
        min-height: 100vh;
      }

      .page {
        min-height: 100vh;
        display: flex;
        flex-direction: column;
      }

      .topbar {
        min-height: 72px;
        border-bottom: 1px solid rgba(17, 21, 20, 0.06);
        background: rgba(248, 249, 246, 0.96);
        backdrop-filter: blur(10px);
      }

      .topbar-inner,
      .content,
      .footer-inner {
        width: min(1240px, calc(100vw - 40px));
        margin: 0 auto;
      }

      .topbar-inner {
        min-height: 72px;
        display: grid;
        grid-template-columns: 1fr auto 1fr;
        align-items: center;
        gap: 16px;
        font-size: 14px;
        color: var(--muted);
      }

      .brand {
        color: var(--text);
        font-weight: 600;
        font-size: 16px;
        letter-spacing: -0.01em;
      }

      .nav {
        display: inline-flex;
        align-items: center;
        gap: 28px;
        justify-self: center;
        font-size: 14px;
        flex-wrap: nowrap;
        white-space: nowrap;
      }

      .nav a {
        position: relative;
        padding: 4px 0;
      }

      .nav a.active {
        color: var(--text);
        font-weight: 500;
      }

      .nav a.active::after {
        content: "";
        position: absolute;
        left: 0;
        right: 0;
        bottom: -1px;
        height: 1px;
        background: var(--text);
      }

      .topbar-actions {
        display: inline-flex;
        justify-content: flex-end;
        align-items: center;
        gap: 18px;
      }

      .icon-button {
        width: 28px;
        height: 28px;
        display: inline-grid;
        place-items: center;
        color: var(--text);
        opacity: 0.8;
      }

      .icon-button svg {
        width: 20px;
        height: 20px;
        stroke: currentColor;
        fill: none;
        stroke-width: 1.6;
        stroke-linecap: round;
        stroke-linejoin: round;
      }

      .content {
        flex: 1;
        padding-top: 48px;
        padding-bottom: 34px;
      }

      .hero-grid {
        display: grid;
        grid-template-columns: minmax(380px, 1.05fr) minmax(520px, 0.95fr);
        gap: 72px;
        align-items: start;
      }

      .eyebrow {
        display: inline-flex;
        align-items: center;
        padding: 4px 12px;
        border-radius: 999px;
        background: var(--green-soft);
        color: #6f8e84;
        font-size: 12px;
        font-weight: 500;
        letter-spacing: 0.02em;
        margin-bottom: 20px;
      }

      .hero-title {
        margin: 0;
        font-size: clamp(34px, 3.2vw, 62px);
        line-height: 0.96;
        font-weight: 500;
        letter-spacing: -0.05em;
        max-width: 4.8em;
      }

      .hero-copy {
        margin: 20px 0 0;
        max-width: 340px;
        color: var(--muted);
        font-size: 15px;
        line-height: 1.65;
      }

      .feature-tile-row {
        display: grid;
        grid-template-columns: repeat(2, minmax(0, 1fr));
        gap: 14px;
        margin-top: 34px;
        max-width: 460px;
      }

      .feature-tile {
        background: var(--surface);
        border: 1px solid var(--surface-line);
        border-radius: var(--radius);
        padding: 14px;
        min-height: 88px;
        box-shadow: var(--shadow-soft);
      }

      .feature-tile-icon {
        width: 22px;
        height: 22px;
        display: inline-grid;
        place-items: center;
        color: var(--text);
        margin-bottom: 10px;
        opacity: 0.85;
      }

      .feature-tile-icon svg {
        width: 17px;
        height: 17px;
        stroke: currentColor;
        fill: none;
        stroke-width: 1.7;
        stroke-linecap: round;
        stroke-linejoin: round;
      }

      .feature-tile h3 {
        margin: 0;
        font-size: 14px;
        font-weight: 500;
        line-height: 1.2;
      }

      .feature-tile p {
        margin: 2px 0 0;
        color: var(--muted-2);
        font-size: 11px;
        line-height: 1.45;
      }

      .alert-card {
        background: var(--surface);
        border-radius: 4px;
        box-shadow: var(--shadow);
        padding: 34px 34px 28px;
        border: 1px solid rgba(16, 26, 23, 0.04);
        margin-top: 26px;
        max-width: 600px;
        justify-self: end;
      }

      .alert-card h2 {
        margin: 0;
        font-size: 30px;
        line-height: 1.1;
        font-weight: 500;
        letter-spacing: -0.03em;
      }

      .alert-card .subtitle {
        margin: 8px 0 0;
        font-size: 14px;
        color: var(--muted);
      }

      .field-group {
        margin-top: 26px;
      }

      .field-label {
        display: block;
        margin-bottom: 10px;
        color: #6b7571;
        font-size: 12px;
        font-weight: 500;
        letter-spacing: 0.04em;
        text-transform: uppercase;
      }

      .text-input,
      .select-button {
        width: 100%;
        height: 42px;
        border: 1px solid var(--surface-line-strong);
        border-radius: 4px;
        background: #f4f5f2;
        color: var(--text);
        padding: 0 13px;
        font-size: 14px;
        outline: none;
        transition:
          border-color 120ms ease,
          background 120ms ease,
          box-shadow 120ms ease;
      }

      .text-input::placeholder {
        color: #9ca6a2;
      }

      .text-input:focus {
        background: var(--surface);
        border-color: #92a49d;
        box-shadow: 0 0 0 2px rgba(23, 53, 47, 0.08);
      }

      .segmented {
        display: grid;
        grid-template-columns: repeat(3, minmax(0, 1fr));
        gap: 10px;
      }

      .select-button {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        cursor: pointer;
        user-select: none;
        background: var(--surface);
        color: #66706c;
      }

      .select-button.active {
        background: var(--green);
        color: #fff;
        border-color: var(--green-strong);
      }

      .range-grid {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 14px;
      }

      .range-input {
        position: relative;
      }

      .range-prefix {
        position: absolute;
        left: 12px;
        top: 50%;
        transform: translateY(-50%);
        color: #8f9894;
        font-size: 13px;
        pointer-events: none;
      }

      .range-input .text-input {
        padding-left: 28px;
      }

      .primary-button {
        width: 100%;
        height: 44px;
        border: 0;
        border-radius: 4px;
        background: linear-gradient(180deg, #17352f 0%, #0f2823 100%);
        color: #fff;
        font-size: 13px;
        font-weight: 600;
        letter-spacing: 0.03em;
        text-transform: uppercase;
        box-shadow: 0 6px 14px rgba(17, 37, 31, 0.28);
        cursor: pointer;
        margin-top: 26px;
      }

      .primary-button:disabled {
        opacity: 0.7;
        cursor: not-allowed;
      }

      .privacy-note {
        margin-top: 12px;
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 8px;
        color: #9aa29e;
        font-size: 11px;
      }

      .privacy-note svg {
        width: 12px;
        height: 12px;
        stroke: currentColor;
        fill: none;
        stroke-width: 1.8;
        stroke-linecap: round;
        stroke-linejoin: round;
      }

      .toast {
        margin-top: 14px;
        font-size: 13px;
        color: #55716a;
        min-height: 20px;
      }

      .toast.error {
        color: #a24e43;
      }

      .footer {
        padding: 24px 0 20px;
        color: #8e9491;
        font-size: 12px;
      }

      @media (max-width: 1200px) {
        .content,
        .topbar-inner,
        .footer-inner {
          width: min(1240px, calc(100vw - 32px));
        }

        .hero-grid {
          grid-template-columns: minmax(340px, 1fr) minmax(420px, 1fr);
          gap: 44px;
        }

        .alert-card {
          max-width: 100%;
        }
      }

      .footer-inner {
        display: flex;
        justify-content: space-between;
        align-items: center;
        gap: 16px;
        border-top: 1px solid transparent;
      }

      .footer-links {
        display: inline-flex;
        gap: 16px;
        flex-wrap: wrap;
        justify-content: flex-end;
      }

      @media (max-width: 980px) {
        .hero-grid {
          grid-template-columns: 1fr;
          gap: 28px;
        }

        .alert-card {
          justify-self: start;
          margin-top: 0;
          max-width: 100%;
        }

        .footer-inner {
          grid-template-columns: 1fr;
          justify-items: start;
        }
      }

      @media (max-width: 700px) {
        .topbar {
          min-height: 0;
          padding: 10px 0;
        }

        .topbar-inner {
          min-height: 0;
          grid-template-columns: 1fr;
          justify-items: center;
          gap: 10px;
          font-size: 13px;
        }

        .nav {
          justify-self: center;
          gap: 18px;
          font-size: 13px;
          flex-wrap: nowrap;
        }

        .topbar-actions {
          justify-self: center;
        }

        .brand {
          font-size: 15px;
        }

        .icon-button {
          width: 24px;
          height: 24px;
        }

        .icon-button svg {
          width: 18px;
          height: 18px;
        }
      }

      @media (max-width: 560px) {
        .content,
        .topbar-inner,
        .footer-inner {
          width: calc(100vw - 24px);
        }

        .content {
          padding-top: 24px;
        }

        .feature-tile-row,
        .range-grid,
        .segmented {
          grid-template-columns: 1fr;
        }

        .hero-title {
          font-size: 44px;
        }

        .hero-copy {
          font-size: 14px;
          max-width: 100%;
        }

        .feature-tile {
          min-height: 76px;
        }

        .alert-card h2 {
          font-size: 26px;
        }

        .alert-card {
          padding: 24px 18px 20px;
        }

        .primary-button {
          height: 42px;
        }
      }
    </style>
  </head>
  <body>
    <div id="root"></div>

    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    {% raw %}
    <script type="text/babel">
      const FREQUENCIES = [
        {value: "daily", label: "Daily"},
        {value: "threedays", label: "3 Days"},
        {value: "weekly", label: "Weekly"},
      ];

      const FEATURES = [
        {
          title: "Market Pulse",
          text: "Tracking of new lisitings off of ebay kleinanzeigen.en",
          icon: (
            <svg viewBox="0 0 24 24" aria-hidden="true">
              <path d="M4 17h16" />
              <path d="M6 15l3-3 3 2 4-6 2 2" />
            </svg>
          ),
        },
        {
          title: "AI Filtering",
          text: "Zero noise, only relevant listings.",
          icon: (
            <svg viewBox="0 0 24 24" aria-hidden="true">
              <path d="M12 4l1.8 4.2L18 10l-4.2 1.8L12 16l-1.8-4.2L6 10l4.2-1.8L12 4Z" />
            </svg>
          ),
        },
      ];

      function formatPrice(value) {
        if (value === "") return "";
        const numeric = Number(value);
        if (Number.isNaN(numeric)) return value;
        return new Intl.NumberFormat("de-DE").format(numeric);
      }

      function App() {
        const [email, setEmail] = React.useState("");
        const [frequency, setFrequency] = React.useState("weekly");
        const [minPrice, setMinPrice] = React.useState("");
        const [maxPrice, setMaxPrice] = React.useState("180000");
        const [status, setStatus] = React.useState({type: "", text: ""});
        const [saving, setSaving] = React.useState(false);

        const submit = async (event) => {
          event.preventDefault();
          setStatus({type: "", text: ""});

          const parsedMax = Number(String(maxPrice).replace(/\./g, ""));
          if (!email.trim()) {
            setStatus({type: "error", text: "Bitte E-Mail-Adresse angeben."});
            return;
          }
          if (!Number.isInteger(parsedMax) || parsedMax < 50000) {
            setStatus({
              type: "error",
              text: "Maximalpreis muss mindestens 50.000 EUR sein.",
            });
            return;
          }

          const payload = {
            email: email.trim(),
            frequency: frequency === "threedays" ? "weekly" : frequency,
            maxPriceEur: parsedMax,
          };

          setSaving(true);
          try {
            const response = await fetch("/api/subscription", {
              method: "POST",
              headers: {"Content-Type": "application/json"},
              body: JSON.stringify(payload),
            });
            const data = await response.json();
            if (!response.ok) {
              throw new Error(
                data.error || "Abo konnte nicht gespeichert werden.",
              );
            }

            setStatus({type: "success", text: "Subscription created."});
          } catch (error) {
            setStatus({
              type: "error",
              text: error.message || "Unbekannter Fehler.",
            });
          } finally {
            setSaving(false);
          }
        };

        return (
          <div className="page">
            <header className="topbar">
              <div className="topbar-inner">
                <div className="brand">Immo Scanner</div>
                <nav className="nav" aria-label="Hauptnavigation">
                  <a className="active" href="#setup">
                    Setup
                  </a>
                  <a href="/subscriptions/manage">Subscriptions</a>
                </nav>
                <div className="topbar-actions" aria-label="Status und Profil">
                  <span className="icon-button" aria-hidden="true">
                    <svg viewBox="0 0 24 24">
                      <path d="M12 6a4 4 0 0 0-4 4v3l-1.5 2h11L16 13v-3a4 4 0 0 0-4-4Z" />
                      <path d="M10.5 18a1.5 1.5 0 0 0 3 0" />
                    </svg>
                  </span>
                  <span className="icon-button" aria-hidden="true">
                    <svg viewBox="0 0 24 24">
                      <circle cx="12" cy="8" r="3.2" />
                      <path d="M6 19c1.5-3.2 4-4.8 6-4.8s4.5 1.6 6 4.8" />
                    </svg>
                  </span>
                </div>
              </div>
            </header>

            <main className="content" id="setup">
              <section className="hero-grid">
                <div>
                  <span className="eyebrow">Institutional-Grade Data</span>
                  <h1 className="hero-title">
                    Immo Scanner
                    <br />
                    Newsletter
                  </h1>
                  <p className="hero-copy">
                    Automated real estate intelligence delivered to your inbox.
                    Precision tracking of market movements, price drops, and
                    high-yield opportunities before they go public.
                  </p>

                  <div className="feature-tile-row">
                    {FEATURES.slice(0, 2).map((feature) => (
                      <article className="feature-tile" key={feature.title}>
                        <span className="feature-tile-icon">
                          {feature.icon}
                        </span>
                        <h3>{feature.title}</h3>
                        <p>{feature.text}</p>
                      </article>
                    ))}
                  </div>
                </div>

                <form className="alert-card" onSubmit={submit}>
                  <h2>Configure Your Alert</h2>
                  <p className="subtitle">
                    Define your investment parameters below.
                  </p>

                  <div className="field-group">
                    <label className="field-label" htmlFor="recipient">
                      Recipient Address
                    </label>
                    <input
                      id="recipient"
                      className="text-input"
                      type="email"
                      placeholder="investor@firm.com"
                      value={email}
                      onChange={(event) => setEmail(event.target.value)}
                    />
                  </div>

                  <div className="field-group">
                    <span className="field-label">Scan Frequency</span>
                    <div
                      className="segmented"
                      role="radiogroup"
                      aria-label="Scan Frequency"
                    >
                      {FREQUENCIES.map((entry) => (
                        <button
                          key={entry.value}
                          type="button"
                          className={`select-button ${frequency === entry.value ? "active" : ""}`}
                          onClick={() => setFrequency(entry.value)}
                        >
                          {entry.label}
                        </button>
                      ))}
                    </div>
                  </div>

                  <div className="field-group">
                    <span className="field-label">Price Range (EUR)</span>
                    <div className="range-grid">
                      <label className="range-input">
                        <span className="range-prefix">€</span>
                        <input
                          className="text-input"
                          inputMode="numeric"
                          placeholder="Min"
                          value={formatPrice(minPrice)}
                          onChange={(event) => {
                            const nextValue = event.target.value.replace(
                              /[^\d]/g,
                              "",
                            );
                            setMinPrice(nextValue);
                          }}
                        />
                      </label>
                      <label className="range-input">
                        <span className="range-prefix">€</span>
                        <input
                          className="text-input"
                          inputMode="numeric"
                          placeholder="Max"
                          value={formatPrice(maxPrice)}
                          onChange={(event) => {
                            const nextValue = event.target.value.replace(
                              /[^\d]/g,
                              "",
                            );
                            setMaxPrice(nextValue);
                          }}
                        />
                      </label>
                    </div>
                  </div>

                  <button
                    className="primary-button"
                    type="submit"
                    disabled={saving}
                  >
                    {saving ? "CREATING..." : "CREATE SUBSCRIPTION"}
                  </button>

                  <div className="privacy-note">
                    <svg viewBox="0 0 24 24" aria-hidden="true">
                      <rect x="5" y="10" width="14" height="9" rx="1.5" />
                      <path d="M8 10V7a4 4 0 0 1 8 0v3" />
                    </svg>
                    <span>Encrypted &amp; Private Data Handling</span>
                  </div>

                  <div className={`toast ${status.type}`}>{status.text}</div>
                </form>
              </section>

            </main>

            <footer className="footer">
              <div className="footer-inner">
                <div>
                  © 2024 Immo Scanner Intelligence. All rights reserved.
                </div>
                <div className="footer-links">
                  <a href="#">Privacy Policy</a>
                  <a href="#">Terms of Service</a>
                  <a href="#">Contact</a>
                </div>
              </div>
            </footer>
          </div>
        );
      }

      ReactDOM.createRoot(document.getElementById("root")).render(<App />);
    </script>
    {% endraw %}
  </body>
</html>
